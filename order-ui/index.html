<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Portal | Distributed System</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .order-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            transition: transform 0.2s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header p {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #a5b4fc;
            cursor: not-allowed;
        }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            text-align: center;
            display: none;
            /* Hidden by default */
        }

        .status-success {
            display: block !important;
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .status-error {
            display: block !important;
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* Loading Spinner Animation */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="order-card">
        <div class="header">
            <h2>Place New Order</h2>
            <p>Enter details to process through the system</p>
        </div>

        <div class="form-group">
            <label for="user_id">User ID</label>
            <input type="number" id="user_id" placeholder="e.g. 101">
        </div>

        <div class="form-group">
            <label for="product_id">Product ID</label>
            <input type="number" id="product_id" placeholder="e.g. 5002">
        </div>

        <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" placeholder="0.00">
        </div>

        <button id="orderBtn" onclick="placeOrder()">Place Order</button>

        <div id="result"></div>
    </div>

    <script>
        async function placeOrder() {
            const btn = document.getElementById("orderBtn");
            const resultDiv = document.getElementById("result");
            const userId = document.getElementById("user_id").value;
            const productId = document.getElementById("product_id").value;
            const price = document.getElementById("price").value;

            // Simple validation
            if (!userId || !productId || !price) {
                showResult("Please fill in all fields", "error");
                return;
            }

            const data = {
                user_id: parseInt(userId),
                product_id: parseInt(productId),
                price: parseInt(price)
            };

            // UI Loading State
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Processing...';
            resultDiv.style.display = "none";

            try {
                const res = await fetch("http://localhost:8080/place-order", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const text = await res.text();

                if (res.ok) {
                    showResult("✔ " + text, "success");
                } else {
                    showResult("✖ Error: " + text, "error");
                }

            } catch (err) {
                showResult("✖ Connection failed. Is the server running?", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Place Order";
            }
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById("result");
            resultDiv.innerText = message;
            resultDiv.className = type === "success" ? "status-success" : "status-error";
        }
    </script>

</body>

</html>
