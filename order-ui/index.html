<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Order Portal</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 360px;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #result {
            margin-top: 1.25rem;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.875rem;
            text-align: center;
            min-height: 20px;
            display: none;
        }

        .status-error {
            background: #fef2f2;
            color: var(--error);
            border: 1px solid #fee2e2;
            display: block !important;
        }

        .status-success {
            background: #f0fdf4;
            color: var(--success);
            border: 1px solid #dcfce7;
            display: block !important;
        }

        .status-loading {
            background: #f1f5f9;
            color: var(--text-muted);
            display: block !important;
        }
    </style>
</head>

<body>

    <div class="card">
        <h3>Place Order</h3>
        <p class="subtitle">Enter the details below to process the request.</p>

        <div class="form-group">
            <label for="user">User ID</label>
            <input type="number" id="user" placeholder="e.g. 101">
        </div>

        <div class="form-group">
            <label for="product">Product ID</label>
            <input type="number" id="product" placeholder="e.g. 5052">
        </div>

        <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" placeholder="e.g. 299">
        </div>

        <button id="orderBtn" onclick="placeOrder()">Place Order</button>

        <div id="result"></div>
    </div>

    <script>
        const ORDER_SERVICE = "http://localhost:8080/place-order"; // Localhost for development
        // const ORDER_SERVICE = "http://your-order-serviceip:8080/place-order"; // Update with actual IP address of the order service

        async function placeOrder() {
            const btn = document.getElementById("orderBtn");
            const resultDiv = document.getElementById("result");

            // Get values
            const user = document.getElementById("user").value;
            const product = document.getElementById("product").value;
            const price = document.getElementById("price").value;

            // Simple validation
            if (!user || !product || !price) {
                showResult("Please fill in all fields", "error");
                return;
            }

            const data = {
                user_id: parseInt(user),
                product_id: parseInt(product),
                price: parseInt(price)
            };

            // UI State: Loading
            btn.disabled = true;
            showResult("Processing order...", "loading");

            try {
                const res = await fetch(ORDER_SERVICE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const text = await res.text();

                if (res.ok) {
                    showResult("Success: " + text, "success");
                } else {
                    showResult("Error: " + text, "error");
                }

            } catch (err) {
                showResult("Connection error. Is the server running?", "error");
            } finally {
                btn.disabled = false;
            }
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById("result");
            resultDiv.innerText = message;
            resultDiv.className = "";
            resultDiv.classList.add(`status-${type}`);
        }
    </script>
</body>

</html>
